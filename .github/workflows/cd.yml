name: CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Trigger deployment on version tags (e.g., v1.0.0)

jobs:
  deploy-backend:
    name: Deploy Backend to Production
    runs-on: ubuntu-latest
    # Only run full backend deploy if tests passed on push to main
    if: github.ref == 'refs/heads/main' 
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/leetcommit-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/leetcommit-backend:${{ github.sha }}

      - name: Deploy to Remote Server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/leetcommit
            docker pull ${{ secrets.DOCKER_USERNAME }}/leetcommit-backend:latest
            docker-compose -f docker-compose.prod.yml up -d
            
  package-extension:
    name: Package & Release Extension
    runs-on: ubuntu-latest
    # Only release the extension when a new version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Extension
        run: npm run build
        
      - name: Package with Web-Ext
        run: npx web-ext build -s dist -a artifacts
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
